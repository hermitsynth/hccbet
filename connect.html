    <div class="heading1"><h1>Connect HCC Account:</h1></div>

    <h3>Enter your HCC address below to connect it:</h3>
    <i>When you connect your account you will be assigned a 7 digit user ID. This ID acts as a wallet to hold your funds you deposit to / earn from the site.</i><br><br>
<form id="connect">
    <input type="text" id="address" name="address">
	<input type="submit" value="submit">
</form>
    
<script>
// Get the form element
const form = document.getElementById('connect');

// Add submit event listener
form.addEventListener('submit', async (event) => {
    // Prevent default form submission (page reload)
    event.preventDefault();

    const addressValue = document.getElementById('address').value;

    // Use fetch to send POST request
    fetch("/var/www/hccbet/private/backend.php", {
        method: "POST",
        body: JSON.stringify({
            connection: "active",
            address: addressValue
        }),
        headers: {
            "Content-type": "application/json"
        }
    })
        .then((response) => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then((json) => {
            // Display the message in the HTML
            const messageElement = document.createElement('p');
            messageElement.textContent = json.status; // Display the status message
            document.body.appendChild(messageElement);
        })
        .catch((error) => console.error('There was a problem with the fetch operation:', error));
});
 
fetch('/var/www/hccbet/private/backend.php')
  .then(response => {
    if (!response.ok) {
      throw new Error('Network response was not ok');
    }
    return response.text(); // or use response.json() if your PHP outputs JSON
  })
  .then(data => {
    console.log(data); // This will log the user's ID
    document.getElementById("userx").innerHTML = data;
  })
  .catch(error => {
    console.error('There was a problem with the fetch operation:', error);
  });

    
    
</script>
